<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedGO — Tu plataforma de estudio médico</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #08061a;
    --bg2: #0d0b28;
    --purple: oklch(0.42 0.18 275);
    --purple-light: oklch(0.62 0.18 275);
    --blue: #3b9edd;
    --orange: #f5a623;
    --white: #f0eeff;
    --muted: rgba(240,238,255,0.5);
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--white);
    overflow-x: hidden;
  }

  /* ─── DYNAMIC LIGHTING BG ─── */
  .bg-stage {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0;
    animation: orbFloat linear infinite;
  }
  .orb1 {
    width: 700px; height: 700px;
    background: radial-gradient(circle, oklch(0.45 0.22 280) 0%, transparent 70%);
    top: -200px; left: -150px;
    animation-duration: 18s; animation-delay: 0s;
    opacity: 0.35;
  }
  .orb2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, oklch(0.50 0.20 260) 0%, transparent 70%);
    top: 30%; right: -100px;
    animation-duration: 22s; animation-delay: -6s;
    opacity: 0.25;
  }
  .orb3 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #1a4fa0 0%, transparent 70%);
    bottom: -200px; left: 30%;
    animation-duration: 26s; animation-delay: -12s;
    opacity: 0.3;
  }
  .orb4 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, oklch(0.55 0.14 295) 0%, transparent 70%);
    top: 10%; left: 50%;
    animation-duration: 20s; animation-delay: -4s;
    opacity: 0.2;
  }
  .orb5 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, #f5a62333 0%, transparent 70%);
    top: 60%; right: 20%;
    animation-duration: 24s; animation-delay: -9s;
    opacity: 0.4;
  }
  @keyframes orbFloat {
    0%   { transform: translate(0px, 0px) scale(1); }
    25%  { transform: translate(60px, -80px) scale(1.1); }
    50%  { transform: translate(-40px, 60px) scale(0.9); }
    75%  { transform: translate(80px, 40px) scale(1.05); }
    100% { transform: translate(0px, 0px) scale(1); }
  }
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(59,158,221,0.4), transparent);
    animation: scanDown 8s ease-in-out infinite;
  }
  @keyframes scanDown {
    0%   { top: -2px; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 0.5; }
    100% { top: 100%; opacity: 0; }
  }

  /* ─── LAYOUT ─── */
  .page { position: relative; z-index: 1; }

  /* ─── NAVBAR ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
    height: 70px;
    background: rgba(8,6,26,0.7);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    transition: background 0.3s;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .nav-logo img { height: 36px; width: auto; }
  .nav-logo-text { font-size: 22px; font-weight: 700; color: var(--white); letter-spacing: -0.5px; }
  .nav-logo-text span { color: var(--orange); }
  .nav-links { display: flex; gap: 36px; }
  .nav-links a {
    color: var(--muted); font-size: 15px; font-weight: 400;
    text-decoration: none; transition: color 0.2s;
    letter-spacing: 0.02em;
  }
  .nav-links a:hover { color: var(--white); }
  .btn-nav {
    background: var(--blue); color: #fff;
    border: none; border-radius: 8px;
    padding: 10px 22px; font-size: 14px; font-weight: 600;
    font-family: 'Outfit', sans-serif;
    cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .btn-nav:hover { background: oklch(0.65 0.18 225); transform: translateY(-1px); }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: flex; align-items: center;
    padding: 0 48px;
    padding-top: 70px;
    position: relative;
    overflow: hidden;
  }
  .hero-bg-img {
    position: absolute;
    inset: 0; z-index: 0;
    background: url('assets/hero-bg.webp') center 30% / cover no-repeat;
  }
  /* Directional overlay: dark left for text, opens up on right */
  .hero-bg-img::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(105deg,
        rgba(8,6,26,0.96) 0%,
        rgba(8,6,26,0.88) 35%,
        rgba(8,6,26,0.55) 55%,
        rgba(8,6,26,0.25) 75%,
        rgba(8,6,26,0.40) 100%
      );
    filter: none;
  }
  /* Bottom fade into next section */
  .hero-bg-img::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 280px;
    background: linear-gradient(to bottom, transparent, var(--bg));
    filter: none;
  }
  .hero-inner {
    max-width: 1200px; margin: 0 auto; width: 100%;
    display: flex; flex-direction: column;
    align-items: flex-start; text-align: left;
    position: relative; z-index: 1;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(59,158,221,0.12); border: 1px solid rgba(59,158,221,0.3);
    border-radius: 100px; padding: 6px 16px;
    font-size: 13px; font-weight: 500; color: var(--blue);
    margin-bottom: 24px;
    animation: fadeUp 0.8s ease both;
  }
  .hero-badge::before {
    content: ''; width: 7px; height: 7px;
    background: var(--blue); border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }
  .hero h1 {
    font-size: clamp(42px, 5vw, 68px);
    font-weight: 800; line-height: 1.08;
    letter-spacing: -2px;
    margin-bottom: 20px;
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--blue), var(--purple-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-sub {
    font-size: 18px; color: var(--muted); line-height: 1.7;
    max-width: 560px; margin-bottom: 36px;
    font-weight: 400;
    animation: fadeUp 0.8s 0.2s ease both;
  }
  .hero-ctas {
    display: flex; gap: 14px; flex-wrap: wrap;
    animation: fadeUp 0.8s 0.3s ease both;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue), oklch(0.52 0.2 270));
    color: #fff; border: none; border-radius: 10px;
    padding: 14px 32px; font-size: 16px; font-weight: 600;
    font-family: 'Outfit', sans-serif;
    cursor: pointer; transition: all 0.25s;
    box-shadow: 0 8px 30px rgba(59,158,221,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(59,158,221,0.5); }
  .btn-ghost {
    background: transparent; color: var(--white);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
    padding: 14px 32px; font-size: 16px; font-weight: 500;
    font-family: 'Outfit', sans-serif;
    cursor: pointer; transition: all 0.25s;
  }
  .btn-ghost:hover { border-color: var(--blue); color: var(--blue); }
  .hero-stats {
    display: flex; gap: 32px; margin-top: 48px;
    animation: fadeUp 0.8s 0.4s ease both;
  }
  .stat-item { display: flex; flex-direction: column; }
  .stat-num { font-size: 28px; font-weight: 800; color: var(--white); }
  .stat-num span { color: var(--orange); }
  .stat-label { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* Hero mascot side */
  .hero-visual {
    display: flex; justify-content: center; align-items: flex-end;
    position: relative;
    animation: fadeUp 0.8s 0.2s ease both;
  }
  .mascot-container {
    position: relative;
    width: 420px; height: 460px;
  }
  .mascot-glow {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 300px; height: 80px;
    background: radial-gradient(ellipse, rgba(59,158,221,0.4), transparent 70%);
    filter: blur(20px);
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
    50% { opacity: 1; transform: translateX(-50%) scaleX(1.2); }
  }
  .mascot-placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(145deg, rgba(59,158,221,0.08), rgba(100,60,200,0.08));
    border: 1px dashed rgba(59,158,221,0.25);
    border-radius: 24px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    position: relative; overflow: hidden;
  }
  .mascot-placeholder::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(59,158,221,0.03) 10px,
      rgba(59,158,221,0.03) 20px
    );
  }
  .mascot-icon {
    font-size: 80px; filter: drop-shadow(0 0 20px rgba(59,158,221,0.5));
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }
  .mascot-label {
    font-size: 13px; color: var(--muted); font-family: monospace;
    text-align: center; line-height: 1.6; padding: 0 20px;
  }

  /* Floating cards on hero */
  .float-card {
    position: absolute;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    animation: floatCard 6s ease-in-out infinite;
    white-space: nowrap;
  }
  .float-card.card1 { top: 30px; right: -20px; animation-delay: 0s; }
  .float-card.card2 { bottom: 80px; left: -30px; animation-delay: 2s; }
  .float-card.card3 { top: 160px; right: -40px; animation-delay: 4s; }
  @keyframes floatCard {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
  .float-icon { font-size: 24px; }
  .float-info p { font-size: 13px; font-weight: 600; color: var(--white); }
  .float-info span { font-size: 11px; color: var(--muted); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── SECTIONS COMMON ─── */
  section { padding: 100px 48px; }
  .section-inner { max-width: 1200px; margin: 0 auto; }
  .section-tag {
    display: inline-block;
    font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue); margin-bottom: 14px;
  }
  .section-title {
    font-size: clamp(30px, 4vw, 48px);
    font-weight: 800; letter-spacing: -1px;
    line-height: 1.1; margin-bottom: 16px;
  }
  .section-sub {
    font-size: 17px; color: var(--muted); line-height: 1.7;
    max-width: 560px; margin-bottom: 56px;
  }

  /* ─── CÓMO FUNCIONA ─── */
  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .step-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 36px 28px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s, border-color 0.3s;
  }
  .step-card:hover { transform: translateY(-4px); border-color: rgba(59,158,221,0.3); }
  .step-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--purple-light));
    opacity: 0; transition: opacity 0.3s;
  }
  .step-card:hover::before { opacity: 1; }
  .step-num {
    font-size: 72px; font-weight: 900; line-height: 1;
    color: rgba(255,255,255,0.04);
    position: absolute; top: 16px; right: 20px;
    letter-spacing: -4px;
  }
  .step-icon-wrap {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin-bottom: 20px;
  }
  .step-card h3 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
  .step-card p { font-size: 15px; color: var(--muted); line-height: 1.65; }

  /* ─── CURSOS ─── */
  .courses-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .course-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
  }
  .course-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    border-color: rgba(255,255,255,0.15);
  }
  .course-banner {
    height: 180px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: rgba(255,255,255,0.35);
    font-family: monospace; position: relative; overflow: hidden;
  }
  .course-banner::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent, transparent 8px,
      rgba(255,255,255,0.02) 8px, rgba(255,255,255,0.02) 16px
    );
  }
  .course-body { padding: 22px 22px 26px; }
  .course-tag {
    display: inline-block;
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; border-radius: 6px;
    padding: 4px 10px; margin-bottom: 12px;
  }
  .course-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .course-card p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 18px; }
  .course-meta { display: flex; gap: 16px; }
  .meta-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); }
  .meta-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); }
  .course-progress { margin-top: 16px; }
  .progress-bar {
    height: 4px; background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--blue), var(--purple-light));
    transition: width 0.6s ease;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-top: 6px;
  }

  /* ─── PRECIOS ─── */
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .plan-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 24px; padding: 36px 28px;
    position: relative; overflow: hidden;
    transition: transform 0.3s;
  }
  .plan-card.featured {
    background: linear-gradient(145deg, rgba(59,158,221,0.15), rgba(100,60,200,0.15));
    border-color: rgba(59,158,221,0.4);
    transform: scale(1.03);
  }
  .plan-card:hover { transform: translateY(-4px); }
  .plan-card.featured:hover { transform: scale(1.03) translateY(-4px); }
  .plan-badge {
    position: absolute; top: 20px; right: 20px;
    background: var(--orange); color: #fff;
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; border-radius: 6px; padding: 4px 10px;
  }
  .plan-name { font-size: 14px; font-weight: 600; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
  .plan-price { font-size: 52px; font-weight: 900; letter-spacing: -2px; line-height: 1; margin-bottom: 4px; }
  .plan-price span { font-size: 20px; font-weight: 500; color: var(--muted); }
  .plan-period { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .plan-features { list-style: none; margin-bottom: 32px; }
  .plan-features li {
    font-size: 15px; color: rgba(240,238,255,0.8);
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 10px;
  }
  .plan-features li::before {
    content: '✓'; color: var(--blue);
    font-weight: 700; flex-shrink: 0;
  }
  .plan-features li.disabled { color: var(--muted); opacity: 0.5; }
  .plan-features li.disabled::before { content: '—'; color: var(--muted); }
  .btn-plan {
    width: 100%; padding: 14px; border-radius: 12px;
    font-size: 15px; font-weight: 600; font-family: 'Outfit', sans-serif;
    cursor: pointer; transition: all 0.25s; border: none;
  }
  .btn-plan-primary {
    background: linear-gradient(135deg, var(--blue), oklch(0.52 0.2 270));
    color: #fff;
    box-shadow: 0 8px 24px rgba(59,158,221,0.35);
  }
  .btn-plan-primary:hover { box-shadow: 0 12px 32px rgba(59,158,221,0.5); transform: translateY(-1px); }
  .btn-plan-ghost {
    background: transparent; color: var(--white);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .btn-plan-ghost:hover { border-color: var(--blue); color: var(--blue); }

  /* ─── SOBRE NOSOTROS ─── */
  .team-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 32px; max-width: 760px;
  }
  .team-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 24px; padding: 36px 32px;
    display: flex; flex-direction: column; align-items: flex-start;
    gap: 14px;
    transition: transform 0.3s, border-color 0.3s;
    position: relative; overflow: hidden;
  }
  .team-card:hover { transform: translateY(-4px); border-color: rgba(59,158,221,0.3); }
  .team-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--purple-light));
    opacity: 0; transition: opacity 0.3s;
  }
  .team-card:hover::after { opacity: 1; }
  .team-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 800;
    flex-shrink: 0;
  }
  .team-name { font-size: 20px; font-weight: 700; }
  .team-role { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .team-bio { font-size: 15px; color: var(--muted); line-height: 1.65; }
  .about-mission {
    background: linear-gradient(135deg, rgba(59,158,221,0.08), rgba(100,60,200,0.08));
    border: 1px solid rgba(59,158,221,0.2);
    border-radius: 20px; padding: 36px 40px;
    margin-bottom: 52px;
    max-width: 760px;
  }
  .about-mission p {
    font-size: 18px; line-height: 1.75; color: rgba(240,238,255,0.85);
    font-style: italic;
  }
  .about-mission span { color: var(--blue); font-style: normal; font-weight: 600; }

  /* ─── FAQ ─── */
  .faq-list { max-width: 760px; }
  .faq-item {
    border-bottom: 1px solid rgba(255,255,255,0.07);
    overflow: hidden;
  }
  .faq-q {
    width: 100%; background: none; border: none;
    color: var(--white); font-family: 'Outfit', sans-serif;
    font-size: 17px; font-weight: 600;
    text-align: left; padding: 22px 0;
    cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    transition: color 0.2s;
  }
  .faq-q:hover { color: var(--blue); }
  .faq-chevron {
    width: 22px; height: 22px; flex-shrink: 0;

// ─── APP ───
function App() {

    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    return () => observer.disconnect();
